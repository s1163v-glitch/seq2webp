<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seq2WebP</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f7f5; --surface: #ffffff; --surface2: #f2f1ef;
    --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.18);
    --text: #1a1a18; --text2: #6b6b68; --text3: #a0a09c;
    --accent: #1a1a18; --accent-light: #f0efe9;
    --danger: #c0392b; --danger-light: #fdf0ee;
    --radius: 10px; --radius-sm: 6px;
  }
  body {
    font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; display: flex; flex-direction: column;
    overflow: hidden; user-select: none; -webkit-user-select: none; font-size: 13px;
  }
  .titlebar {
    height: 44px; display: flex; align-items: center; padding: 0 16px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    -webkit-app-region: drag; flex-shrink: 0; gap: 8px;
  }
  .titlebar-icon { width: 18px; height: 18px; opacity: 0.7; }
  .titlebar-title { font-size: 13px; font-weight: 600; letter-spacing: 0.01em; color: var(--text); }
  .titlebar-sub { font-size: 11px; color: var(--text3); margin-left: 4px; }
  .main { display: flex; flex: 1; overflow: hidden; }
  .panel-left {
    width: 300px; flex-shrink: 0; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;
  }
  .panel-section { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); }
  .section-title {
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text3); margin-bottom: 10px;
  }
  #drop-zone {
    border: 1.5px dashed var(--border2); border-radius: var(--radius);
    padding: 20px 12px; text-align: center; cursor: pointer;
    background: var(--bg); transition: all 0.15s; position: relative;
  }
  #drop-zone.drag { border-color: var(--accent); background: var(--accent-light); }
  #drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .dz-icon { font-size: 22px; margin-bottom: 6px; }
  .dz-title { font-size: 12px; font-weight: 600; margin-bottom: 3px; }
  .dz-sub { font-size: 11px; color: var(--text3); }
  .file-list-wrap { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
  .file-item { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: var(--radius-sm); background: var(--bg); }
  .file-num { font-size: 10px; color: var(--text3); min-width: 18px; text-align: right; flex-shrink: 0; }
  .file-thumb { width: 28px; height: 28px; border-radius: 4px; background: var(--surface2); object-fit: cover; flex-shrink: 0; border: 1px solid var(--border); }
  .file-ext-badge { width: 28px; height: 28px; border-radius: 4px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; color: var(--text2); flex-shrink: 0; }
  .file-name { flex: 1; font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-list-footer {
    padding: 8px 14px; display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid var(--border); background: var(--surface);
  }
  .file-count { font-size: 11px; color: var(--text2); }
  #clear-btn { font-size: 11px; color: var(--danger); background: none; border: none; cursor: pointer; padding: 3px 6px; border-radius: 4px; }
  #clear-btn:hover { background: var(--danger-light); }
  .panel-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
  .settings-bar {
    padding: 12px 18px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; gap: 14px; align-items: flex-end; flex-shrink: 0; flex-wrap: wrap;
  }
  .ctrl { display: flex; flex-direction: column; gap: 5px; }
  .ctrl label { font-size: 11px; color: var(--text2); }
  .ctrl input[type=number], .ctrl select {
    width: 86px; padding: 5px 8px; font-size: 13px;
    border: 1px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text); outline: none;
  }
  .ctrl input[type=number]:focus, .ctrl select:focus { border-color: var(--accent); }
  .ctrl-quality { flex: 1; min-width: 90px; }
  .ctrl-quality label { display: flex; justify-content: space-between; }
  .ctrl-quality input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
  .format-toggle { display: flex; border: 1px solid var(--border2); border-radius: var(--radius-sm); overflow: hidden; }
  .fmt-btn {
    flex: 1; padding: 5px 16px; font-size: 13px; font-weight: 500;
    border: none; background: var(--bg); color: var(--text2); cursor: pointer; transition: background 0.12s, color 0.12s;
  }
  .fmt-btn.active { background: var(--accent); color: #fff; }
  .fmt-btn:not(.active):hover { background: var(--surface2); }
  .gif-only { display: none; }
  .gif-only.visible { display: flex; }
  /* 디더링 토글 */
  .toggle-wrap { display: flex; align-items: center; gap: 6px; padding-top: 18px; }
  .toggle-wrap label { font-size: 11px; color: var(--text2); cursor: pointer; }
  .toggle { position: relative; width: 32px; height: 18px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0; background: var(--border2);
    border-radius: 9px; cursor: pointer; transition: background 0.15s;
  }
  .toggle-slider:before {
    content: ''; position: absolute; width: 12px; height: 12px;
    left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform 0.15s;
  }
  .toggle input:checked + .toggle-slider { background: var(--accent); }
  .toggle input:checked + .toggle-slider:before { transform: translateX(14px); }
  .preview-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 20px; overflow: hidden; position: relative;
  }
  .preview-empty { text-align: center; color: var(--text3); pointer-events: none; }
  .preview-empty .empty-icon { font-size: 40px; margin-bottom: 10px; }
  .preview-empty p { font-size: 12px; }
  #preview-img {
    max-width: 100%; max-height: 100%; border-radius: var(--radius); border: 1px solid var(--border);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06); display: none; object-fit: contain;
  }
  .bottom-bar {
    padding: 12px 18px; background: var(--surface); border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  #convert-btn {
    padding: 7px 22px; font-size: 13px; font-weight: 600;
    border-radius: var(--radius-sm); border: 1px solid var(--accent);
    background: var(--accent); color: #fff; cursor: pointer;
    transition: opacity 0.1s, transform 0.1s; white-space: nowrap; flex-shrink: 0;
  }
  #convert-btn:hover:not(:disabled) { opacity: 0.85; }
  #convert-btn:active:not(:disabled) { transform: scale(0.98); }
  #convert-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  #save-btn {
    padding: 7px 18px; font-size: 13px; font-weight: 500;
    border-radius: var(--radius-sm); border: 1px solid var(--border2);
    background: var(--surface); color: var(--text); cursor: pointer;
    transition: background 0.1s; display: none; white-space: nowrap; flex-shrink: 0;
  }
  #save-btn:hover { background: var(--surface2); }
  .progress-wrap { flex: 1; display: none; flex-direction: column; gap: 4px; }
  .progress-track { height: 3px; border-radius: 2px; background: var(--surface2); overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.2s; }
  #progress-label { font-size: 11px; color: var(--text2); }
  #output-info { font-size: 11px; color: var(--text2); display: none; }
  #error-bar {
    padding: 8px 18px; background: var(--danger-light); color: var(--danger);
    font-size: 12px; border-top: 1px solid rgba(192,57,43,0.2); display: none; flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="titlebar">
  <svg class="titlebar-icon" viewBox="0 0 18 18" fill="none">
    <rect x="1" y="1" width="7" height="7" rx="1.5" fill="#1a1a18" opacity="0.7"/>
    <rect x="10" y="1" width="7" height="7" rx="1.5" fill="#1a1a18" opacity="0.45"/>
    <rect x="1" y="10" width="7" height="7" rx="1.5" fill="#1a1a18" opacity="0.45"/>
    <rect x="10" y="10" width="7" height="7" rx="1.5" fill="#1a1a18" opacity="0.25"/>
  </svg>
  <span class="titlebar-title">Seq2WebP</span>
  <span class="titlebar-sub">이미지 시퀀스 → 애니메이션 WebP / GIF</span>
</div>

<div class="main">
  <div class="panel-left">
    <div class="panel-section">
      <div class="section-title">이미지 시퀀스</div>
      <div id="drop-zone">
        <input type="file" id="file-input" multiple accept=".png,.jpg,.jpeg,.tif,.tiff,.webp,.bmp">
        <div class="dz-icon">🖼️</div>
        <div class="dz-title">파일을 끌어다 놓거나<br>클릭해서 선택</div>
        <div class="dz-sub" style="margin-top:6px">PNG · JPEG · TIF · WebP · BMP</div>
      </div>
    </div>
    <div class="file-list-wrap" id="file-list"></div>
    <div class="file-list-footer">
      <span class="file-count" id="file-count">0개 파일</span>
      <button id="clear-btn" style="display:none">초기화</button>
    </div>
  </div>

  <div class="panel-right">
    <div class="settings-bar">
      <div class="ctrl">
        <label>출력 포맷</label>
        <div class="format-toggle">
          <button class="fmt-btn active" data-fmt="webp">WebP</button>
          <button class="fmt-btn" data-fmt="gif">GIF</button>
        </div>
      </div>
      <div class="ctrl">
        <label>FPS</label>
        <input type="number" id="fps-input" min="1" max="60" value="12">
      </div>
      <div class="ctrl">
        <label>루프</label>
        <select id="loop-select">
          <option value="0">무한 반복</option>
          <option value="1">1회</option>
          <option value="2">2회</option>
          <option value="3">3회</option>
        </select>
      </div>
      <div class="ctrl">
        <label>너비 (px)</label>
        <input type="number" id="width-input" min="1" max="8192" placeholder="원본">
      </div>
      <div class="ctrl">
        <label>높이 (px)</label>
        <input type="number" id="height-input" min="1" max="8192" placeholder="원본">
      </div>
      <!-- GIF 전용 옵션 -->
      <div class="ctrl gif-only" id="palette-ctrl">
        <label>팔레트 (GIF)</label>
        <select id="palette-select">
          <option value="16">16색</option>
          <option value="32">32색</option>
          <option value="64">64색</option>
          <option value="128">128색</option>
          <option value="256" selected>256색</option>
        </select>
      </div>
      <div class="ctrl gif-only" id="blur-ctrl">
        <label>블러 <span id="blur-val">0</span></label>
        <input type="range" id="blur-input" min="0" max="3" value="0" step="0.5" style="width:86px;accent-color:var(--accent);cursor:pointer">
      </div>
      <div class="toggle-wrap gif-only" id="dither-ctrl">
        <label class="toggle">
          <input type="checkbox" id="dither-check" checked>
          <span class="toggle-slider"></span>
        </label>
        <label for="dither-check">디더링</label>
      </div>
      <div class="ctrl ctrl-quality">
        <label>화질 <span id="quality-val">85</span>%</label>
        <input type="range" id="quality-input" min="10" max="100" value="85" step="5">
      </div>
    </div>

    <div class="preview-wrap">
      <div class="preview-empty" id="preview-empty">
        <div class="empty-icon">✦</div>
        <p>변환하면 여기서 미리볼 수 있어요</p>
      </div>
      <img id="preview-img" alt="미리보기">
    </div>

    <div id="error-bar"></div>

    <div class="bottom-bar">
      <button id="convert-btn" disabled>변환 시작</button>
      <button id="save-btn">저장...</button>
      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        <div id="progress-label">준비 중...</div>
      </div>
      <div id="output-info"></div>
    </div>
  </div>
</div>

<script src="renderer.js"></script>
</body>
</html>
